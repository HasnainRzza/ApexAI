<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecturer — APEXAI Quiz</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}" />
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-brand">APEXAI<small>Lecturer Portal</small></div>
      <nav>
        <button type="button" class="nav-item active" data-panel="panel-courses">My Courses</button>
        <button type="button" class="nav-item" data-panel="panel-quizzes">My Quizzes</button>
        <button type="button" class="nav-item" data-panel="panel-create">Create Quiz</button>
      </nav>
      <div class="sidebar-footer">
        <p><strong>{{ user.first_name }} {{ user.last_name }}</strong></p>
        <p style="color:var(--muted);font-size:0.75rem">{{ user.email }}</p>
        <a href="/logout" class="btn btn-ghost btn-sm" style="width:100%;margin-top:0.75rem;text-align:center">Sign out</a>
      </div>
    </aside>

    <main class="main-content">
      <section id="panel-courses" class="panel active">
        <header class="page-header"><h1>Assigned Courses</h1></header>
        <div id="courses-table"></div>
      </section>

      <section id="panel-quizzes" class="panel">
        <header class="page-header"><h1>My Quizzes</h1></header>
        <div id="quizzes-table"></div>
        <div id="submissions-panel" class="card hidden" style="margin-top:1.5rem">
          <h2>Submissions</h2>
          <div id="submissions-table"></div>
        </div>
      </section>

      <section id="panel-create" class="panel">
        <header class="page-header"><h1>Create Quiz</h1></header>
        <form id="form-quiz" class="card">
          <div class="form-row">
            <div class="form-group">
              <label>Course</label>
              <select name="course_id" id="quiz-course-select" required></select>
            </div>
            <div class="form-group">
              <label>Title</label>
              <input name="title" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Start</label>
              <input name="start_time" type="datetime-local" required />
            </div>
            <div class="form-group">
              <label>End</label>
              <input name="end_time" type="datetime-local" required />
            </div>
          </div>
          <div class="form-row">
            <div class="form-group">
              <label>Duration (minutes)</label>
              <input name="duration_minutes" type="number" min="1" value="30" required />
            </div>
            <div class="form-group" style="display:flex;align-items:flex-end;gap:0.5rem;padding-bottom:0.6rem">
              <input type="checkbox" name="allow_multiple_attempts" id="allow-multi" />
              <label for="allow-multi">Allow multiple attempts</label>
            </div>
          </div>
          <h2 style="margin:1.5rem 0 1rem;color:var(--text)">Questions</h2>
          <div id="questions-container"></div>
          <button type="button" class="btn btn-ghost" id="btn-add-question">+ Add Question</button>
          <footer style="margin-top:1.5rem">
            <button type="submit" class="btn btn-primary">Create Quiz</button>
          </footer>
        </form>
      </section>
    </main>
  </div>

  <script src="{{ url_for('static', filename='js/api.js') }}"></script>
  <script src="{{ url_for('static', filename='js/ui.js') }}"></script>
  <script src="{{ url_for('static', filename='js/lecturer.js') }}"></script>
</body>
</html>
