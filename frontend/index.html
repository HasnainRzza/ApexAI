<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exam Environment</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f9; padding: 20px; }
        .container { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 600px; margin: 0 auto; }
        h1 { color: #333; }
        .status { margin-top: 20px; padding: 10px; background: #e0ffe0; border-left: 5px solid #28a745; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Online Quiz System</h1>
        <p>Please do not switch tabs or minimize this window during the exam. Fullscreen mode is recommended.</p>
        <button onclick="document.documentElement.requestFullscreen()">Go Fullscreen</button>
        <div class="status">
            Proctoring Agent Active. WebSocket Connected.
        </div>
    </div>
    <script src="proctor_agent.js"></script>
</body>
</html>
